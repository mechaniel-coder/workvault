services:
  workvault:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        VITE_API_BASE: ${VITE_API_BASE:-}
    ports:
      - "${PORT:-8080}:8080"
    environment:
      PORT: 8080
      WORKVAULT_API_URL: ${WORKVAULT_API_URL:-https://workvault.netlify.app}
    restart: unless-stopped
