name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: Release tag
        required: true
        type: string
        default: 'v0.1.0'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - run: npm ci

      - name: Set release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: .
          tagName: ${{ steps.tag.outputs.name }}
          releaseName: WorkVault ${{ steps.tag.outputs.name }}
          releaseBody: |
            Download the `.dmg` below, drag WorkVault to Applications, and launch.

            Optional: Settings → Cloud Sync to sign in and enable Netlify backup and integrations.

            Setup guide: https://github.com/mechaniel-coder/workvault#download-the-app-recommended
          releaseDraft: false
          prerelease: false
