name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: Release tag
        required: true
        type: string
        default: 'v0.2.0'

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            name: macOS (Apple Silicon)
            args: '--target aarch64-apple-darwin'
          - platform: windows-latest
            name: Windows (x64)
            args: ''
          - platform: ubuntu-22.04
            name: Linux (x64)
            args: ''

    runs-on: ${{ matrix.platform }}
    name: Build — ${{ matrix.name }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev

      - run: npm ci

      - name: Set release tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: .
          tagName: ${{ steps.tag.outputs.name }}
          releaseName: WorkVault ${{ steps.tag.outputs.name }}
          releaseBody: |
            ## WorkVault v0.2.0

            Local-first desktop app with **36 industry workspaces**, PWA mobile support, and optional Netlify sync.

            ## Downloads

            | Platform | File | Status |
            |----------|------|--------|
            | **macOS** (Apple Silicon) | `.dmg` | Available below |
            | **Windows** (64-bit) | `.exe` (NSIS) | **Coming soon** |
            | **Linux** (64-bit) | `.AppImage` / `.deb` | **Coming soon** |

            ### macOS
            1. Download the `.dmg` below
            2. Drag **WorkVault** to **Applications**
            3. Launch from Applications or Spotlight

            > **First launch:** if macOS blocks the app, right-click → **Open** once.

            ### Windows & Linux
            Installers for Windows and Linux are **coming soon**. Use the [web app](https://workvault.netlify.app) in the meantime, or watch this release for new assets.

            ### What's new in v0.2.0
            - 36 industry-tailored workspaces (nav, themes, dashboard copy)
            - Industry welcome pages at [workvault.netlify.app/welcome](https://workvault.netlify.app/welcome)
            - PWA mobile install from the web app

            Optional: **Settings → Cloud Sync** for Netlify backup & integrations.

            [Setup guide](https://github.com/mechaniel-coder/workvault#download-the-app-recommended) · [All platforms](https://github.com/mechaniel-coder/workvault/blob/main/docs/PLATFORMS.md)
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
