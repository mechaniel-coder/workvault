<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="WorkVault — The all-in-one platform for contract workers. Contracts, invoices, time tracking, work protection, and more." />
    <meta name="theme-color" content="#4f46e5" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <title>WorkVault — Contract Worker Platform</title>
    <style>
      #splash{position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(135deg,#0f172a,#1e293b);transition:opacity .5s ease}
      #splash.hidden{opacity:0;pointer-events:none}
      .splash-logo{width:64px;height:64px;border-radius:16px;background:linear-gradient(135deg,#4f46e5,#818cf8);display:flex;align-items:center;justify-content:center;box-shadow:0 20px 40px rgba(79,70,229,.4);animation:sf 2.5s ease-in-out infinite}
      @keyframes sf{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
      .splash-title{color:#fff;font-family:Inter,system-ui,sans-serif;font-size:24px;font-weight:700;margin-top:20px;letter-spacing:-.02em}
      .splash-sub{color:rgba(199,210,254,.7);font-family:Inter,system-ui,sans-serif;font-size:11px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;margin-top:4px}
      .splash-bar{width:180px;height:3px;background:rgba(255,255,255,.1);border-radius:99px;margin-top:32px;overflow:hidden}
      .splash-bar-fill{height:100%;width:40%;background:linear-gradient(90deg,#818cf8,#6366f1);border-radius:99px;animation:sp 1.5s ease-in-out infinite}
      @keyframes sp{0%{width:10%;margin-left:0}50%{width:60%;margin-left:20%}100%{width:10%;margin-left:90%}}
    </style>
  </head>
  <body>
    <div id="splash">
      <div class="splash-logo">
        <svg width="28" height="28" viewBox="0 0 32 32" fill="none"><path d="M8 22V10l8-4 8 4v12l-8 4-8-4z" stroke="white" stroke-width="1.5" fill="none"/><path d="M16 6v20M8 10l8 4 8-4" stroke="white" stroke-width="1.5"/></svg>
      </div>
      <p class="splash-title">WorkVault</p>
      <p class="splash-sub">Contract Worker Platform</p>
      <div class="splash-bar"><div class="splash-bar-fill"></div></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
